name: CI

on: pull_request

jobs:
  ci:
    name: Check and test

    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Check
        run: vp check

      - name: Test
        run: vp test --coverage
