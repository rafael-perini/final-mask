name: CI

on: pull_request

jobs:
  ci:
    name: Check and Test

    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v7

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install
        run: vp install

      - name: Check
        run: vp check

      - name: Test
        run: vp test
