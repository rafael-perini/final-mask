name: CI

on: pull_request

permissions:
  contents: read

jobs:
  ci:
    name: Check and test

    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          run-install: true

      - name: Validate PR commits with Commitlint
        run: vp exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Check
        run: vp check

      - name: Check Dependencies
        run: vpr depcruise

      - name: Test
        run: vp test --coverage
